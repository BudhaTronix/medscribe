services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    mem_limit: 1g
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 6

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env.prod.example
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:8080"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 6

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env.prod.example
    environment:
      API_BASE_URL: http://nginx:8080
    command: ["python", "-m", "app.ui.gradio_app"]
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_healthy
    ports:
      - "7860:7860"
    volumes:
      - ./certs:/app/certs:ro

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  qdrant_data:
  ollama_models:
