apiVersion: apps/v1
kind: Deployment
metadata:
  name: clinical-voice-note-api
  namespace: clinical-voice-note
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: clinical-voice-note-api
  template:
    metadata:
      labels:
        app: clinical-voice-note-api
    spec:
      containers:
        - name: api
          image: clinical-voice-note-assistant:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: clinical-voice-note-config
            - secretRef:
                name: clinical-voice-note-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
